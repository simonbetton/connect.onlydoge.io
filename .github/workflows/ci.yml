name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Biome Check
        run: bun run check

      - name: React Doctor
        run: bun run doctor:ci

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test
