name: Bug report
description: Report a reproducible defect in validation, relay simulation, or UI behavior.
title: "[Bug]: "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue. Please provide enough detail for us to reproduce and verify the problem.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I checked for existing issues with the same problem.
          required: true
        - label: I can reproduce this on the latest main branch state.
          required: true

  - type: textarea
    id: summary
    attributes:
      label: Bug summary
      description: What is broken?
      placeholder: A clear, concise summary of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps, inputs, and API calls.
      placeholder: |
        1. Go to /tools
        2. Paste URI ...
        3. Click Validate URI
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: payload
    attributes:
      label: Sample payload or request
      description: Include sanitized URI, envelope, or relay payload that triggers the issue.
      render: json

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant console output, stack traces, or screenshots.

  - type: input
    id: version
    attributes:
      label: App version or commit
      description: Git SHA or release tag.
      placeholder: e.g. 3f4a2d1

  - type: input
    id: runtime
    attributes:
      label: Runtime details
      description: Bun version, Node version, OS.
      placeholder: e.g. Bun 1.3.2, Node 22.13.1, macOS 15.3
